<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>lu77U-MobileSec</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;color:#e0e0e0;font-family:Menlo,Monaco,"Courier New",monospace;font-size:13px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:200px;min-width:200px;background:#0a0a0a;border-right:1px solid #222;display:flex;flex-direction:column}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Sidebar */
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid #1e1e1e}
.sb-logo .name{font-size:14px;font-weight:700;color:#00ff88;letter-spacing:.04em}
.sb-logo .tagline{font-size:10px;color:#666;margin-top:3px}
.sb-nav{padding:10px 8px;flex:1}
.sb-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:5px;color:#777;font-size:12px;margin-bottom:1px;cursor:pointer;transition:background .12s,color .12s}
.sb-link:hover{background:#141414;color:#e0e0e0}
.sb-link.active{background:#141414;color:#00ff88}
.sb-status{padding:12px 16px;border-top:1px solid #1e1e1e;font-size:10px;color:#555;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0}
.dot.ok{background:#00ff88}

/* Header */
#hdr{padding:14px 24px;border-bottom:1px solid #141414;background:#000;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#hdr-title{font-size:14px;font-weight:700;color:#e0e0e0}
#hdr-sub{font-size:10px;color:#666;margin-top:2px}
#hdr-actions{display:flex;gap:8px;align-items:center}

/* Page scroll area */
#page{flex:1;overflow-y:auto;padding:20px 24px}

/* Cards */
.card{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;padding:20px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#555;margin-bottom:14px}

/* Alert/banner */
.banner{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:12px}
.banner-warn{background:#2a1a0a;border:1px solid #4a2e0a;color:#cc8800}
.banner-warn a{color:#ffaa33;text-decoration:underline;cursor:pointer}
.banner-err{background:#1a0a0a;border:1px solid #4a1010;color:#cc4444}
.banner-ok{background:#0a1a0a;border:1px solid #0a3a1a;color:#00cc66}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;padding:14px 16px}
.stat-val{font-size:26px;font-weight:700;line-height:1;color:#e0e0e0}
.stat-val.c-green{color:#00ff88}
.stat-val.c-red{color:#ff5555}
.stat-val.c-orange{color:#ff9933}
.stat-val.c-blue{color:#4da6ff}
.stat-label{font-size:10px;color:#666;margin-top:6px}

/* Upload */
.drop-zone{border:1px dashed #2a2a2a;border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.drop-zone:hover,.drop-zone.drag{border-color:#00ff88;background:rgba(0,255,136,.04)}
.drop-icon{font-size:28px;color:#444;margin-bottom:10px}
.drop-text{font-size:13px;color:#aaa}
.drop-hint{font-size:10px;color:#666;margin-top:6px}
.path-row{display:flex;gap:8px;margin-top:12px}

/* Inputs */
input[type=text],input[type=password],select,textarea{background:#030303;border:1px solid #222;border-radius:6px;padding:7px 11px;color:#e0e0e0;font-size:12px;font-family:inherit;outline:none;transition:border-color .12s}
input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:#00ff88}
input::placeholder{color:#444}
select option{background:#0a0a0a}
select{cursor:pointer}
textarea{width:100%;resize:vertical;line-height:1.5}
textarea.mono{font-family:Menlo,Consolas,monospace;font-size:11.5px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:opacity .12s}
.btn-primary{background:#00ff88;color:#000}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid #222;color:#888}
.btn-ghost:hover{border-color:#444;color:#e0e0e0}
.btn-sm{padding:5px 11px;font-size:11px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:7px 12px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#666;border-bottom:1px solid #141414;text-align:left;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #0d0d0d;font-size:12px;vertical-align:middle;color:#c0c0c0}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#070707;cursor:pointer}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-critical{background:rgba(255,68,68,.18);color:#ff6666;border:1px solid rgba(255,68,68,.3)}
.badge-high{background:rgba(255,136,0,.18);color:#ff9933;border:1px solid rgba(255,136,0,.3)}
.badge-medium{background:rgba(255,204,0,.18);color:#ffcc33;border:1px solid rgba(255,204,0,.3)}
.badge-low{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.2)}
.badge-info{background:rgba(68,136,255,.14);color:#6699ff;border:1px solid rgba(68,136,255,.25)}
.badge-pending{background:rgba(100,100,100,.18);color:#888;border:1px solid #333}
.badge-running{background:rgba(0,255,136,.08);color:#00cc66;border:1px solid rgba(0,255,136,.15)}
.badge-done{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.2)}
.badge-failed{background:rgba(255,68,68,.14);color:#ff6666;border:1px solid rgba(255,68,68,.25)}
.badge-verified{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.2)}
.badge-unverified{background:rgba(255,68,68,.14);color:#ff6666;border:1px solid rgba(255,68,68,.25);cursor:pointer;text-decoration:line-through}
.badge-notattempted{background:rgba(100,100,100,.18);color:#888;border:1px solid #333;cursor:pointer}
.badge-cvss{background:rgba(150,150,170,.14);color:#a0a0b8;border:1px solid rgba(150,150,170,.25);font-family:Menlo,monospace}
.dyn-reason{display:none;margin-top:7px}
.dyn-reason.open{display:block}

/* Progress */
.prog-wrap{background:#141414;border-radius:4px;height:3px;overflow:hidden;margin:8px 0}
.prog-bar{height:100%;background:#00ff88;border-radius:4px;transition:width .35s ease}

/* Stage checklist */
.stage-list{display:flex;flex-direction:column;gap:8px}
.stage{display:flex;align-items:center;gap:9px;font-size:12px;color:#444}
.stage-icon{width:16px;flex-shrink:0;text-align:center;font-size:12px}
.stage.active{color:#e0e0e0}
.stage.active .stage-icon{color:#00ff88}
.stage.done{color:#777}
.stage.done .stage-icon{color:#00ff88}

/* Log panel */
.log-panel{background:#030303;border:1px solid #141414;border-radius:6px;padding:10px 12px;height:200px;overflow-y:auto;font-size:11px;line-height:1.7;color:#666}
.ll{color:#777}
.ll.err{color:#ff6666}
.ll.warn{color:#ffcc33}
.ll.ok{color:#00ff88}

/* Settings */
.field{margin-bottom:12px}
.field>label{display:block;font-size:10px;color:#777;margin-bottom:5px}
.hint{font-size:10px;color:#444;margin-top:4px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.toggle-label{font-size:12px;color:#d0d0d0}
.toggle-sub{font-size:10px;color:#666;margin-top:2px}
.sw{width:36px;height:20px;background:#222;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .18s}
.sw.on{background:#00ff88}
.sw-knob{width:16px;height:16px;background:#ddd;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .18s;pointer-events:none}
.sw.on .sw-knob{left:18px}
.key-row{display:flex;gap:6px}
.key-row input{flex:1}
.ptabs{display:flex;gap:2px;background:#050505;border-radius:6px;padding:3px;margin-bottom:12px}
.ptab{padding:5px 14px;border-radius:5px;font-size:11px;cursor:pointer;color:#666;transition:background .12s,color .12s}
.ptab.active{background:#0f0f0f;color:#00ff88}
.test-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px}

/* Scan detail */
.score-wrap{display:flex;align-items:center;gap:20px;margin-bottom:14px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.mk{font-size:10px;color:#666}
.mv{font-size:12px;color:#d0d0d0}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.flt{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:transparent;border:1px solid #222;color:#666;font-family:inherit;transition:all .12s}
.flt.active,.flt:hover{border-color:#00ff88;color:#00ff88}
.vuln{background:#050505;border:1px solid #141414;border-radius:6px;padding:12px 14px;margin-bottom:8px}
.vuln-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.vuln-title{font-size:13px;font-weight:600;flex:1;color:#e0e0e0}
.vuln-body{font-size:11px;color:#888;line-height:1.65}
.vsect{margin-top:7px}
.vk{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#444;margin-bottom:2px}
.vv{color:#999}
.code-snip{background:#000;border:1px solid #141414;border-radius:4px;padding:8px;font-size:10px;color:#6699ff;overflow-x:auto;margin-top:5px;white-space:pre;line-height:1.5}

/* Export dropdown */
.export-wrap{position:relative;display:inline-block}
.export-menu{display:none;position:absolute;right:0;top:calc(100% + 4px);background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;min-width:140px;z-index:500;overflow:hidden}
.export-wrap.open .export-menu{display:block}
.export-item{display:block;padding:8px 14px;font-size:11px;color:#ccc;cursor:pointer;text-decoration:none;font-family:inherit;background:transparent;border:none;width:100%;text-align:left}
.export-item:hover{background:#141414;color:#00ff88}

/* Checkbox */
.cb-cell{width:28px;padding:0 6px 0 2px}
input[type=checkbox]{accent-color:#00ff88;cursor:pointer;width:13px;height:13px}
.sel-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;min-height:24px}
.sel-count{font-size:11px;color:#666}
.sel-count.active{color:#00ff88}

/* Search */
.search-row{margin-bottom:12px}
.search-row input{width:100%}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:#444;font-size:12px}
.empty .big{font-size:28px;margin-bottom:10px}

/* Toast */
#toasts{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:6px;z-index:9999}
.toast{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:9px 14px;font-size:11px;color:#e0e0e0;animation:tin .18s ease}
.toast.err{border-color:#ff5555;color:#ff7777}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Utils */
.row-between{display:flex;justify-content:space-between;align-items:center}
.text-muted{color:#666;font-size:11px}
.text-green{color:#00ff88}
.text-red{color:#ff6666}
.text-orange{color:#ff9933}
.spin{animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="name">lu77U-MobileSec</div>
      <div class="tagline">Mobile Security Scanner</div>
    </div>
    <nav class="sb-nav" id="sb-nav">
      <div class="sb-link" data-r="/" onclick="nav('/')">⊞&nbsp;&nbsp;Dashboard</div>
      <div class="sb-link" data-r="/scans" onclick="nav('/scans')">≡&nbsp;&nbsp;Scans</div>
      <div class="sb-link" data-r="/settings" onclick="nav('/settings')">⚙&nbsp;&nbsp;Settings</div>
    </nav>
    <div class="sb-status">
      <div class="dot" id="sb-dot"></div>
      <span id="sb-txt">Checking…</span>
    </div>
  </div>
  <div id="main">
    <div id="hdr">
      <div>
        <div id="hdr-title">Dashboard</div>
        <div id="hdr-sub"></div>
      </div>
      <div id="hdr-actions"></div>
    </div>
    <div id="page"></div>
  </div>
</div>
<div id="toasts"></div>

<script>
'use strict';

let _cleanupFn = null;
let _lastStatus = null;

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, isErr) {
  const w = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = 'toast' + (isErr ? ' err' : '');
  d.textContent = msg;
  w.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

async function apiFetch(method, path, body) {
  const opts = { method };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('/api' + path, opts);
  if (!res.ok) {
    let msg = 'Request failed (' + res.status + ')';
    try {
      const j = await res.json();
      // detail can be a string or an object { message, status }
      if (typeof j.detail === 'string') msg = j.detail;
      else if (j.detail && typeof j.detail === 'object') msg = j.detail.message || JSON.stringify(j.detail);
      else if (j.message) msg = j.message;
    } catch(_) {}
    throw new Error(msg);
  }
  return res.json();
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtSize(bytes) {
  const n = Number(bytes) || 0;
  if (n < 1024) return n + ' B';
  return (n / 1024).toFixed(1) + ' KB';
}

function sevClass(sev) {
  const s = (sev || 'informational').toLowerCase();
  return s.startsWith('info') ? 'info' : s;
}
function sevBadge(sev) {
  return '<span class="badge badge-' + sevClass(sev) + '">' + esc(sev || 'Informational') + '</span>';
}

function statusBadge(st) {
  const s = (st || '').toLowerCase();
  const cls = { queued: 'badge-pending', pending: 'badge-pending', running: 'badge-running', completed: 'badge-done', failed: 'badge-failed', cancelled: 'badge-pending' }[s] || 'badge-info';
  return '<span class="badge ' + cls + '">' + esc(st || '?') + '</span>';
}

const PHASE_LABELS = {
  starting: 'Initializing',
  detecting: 'Framework Detection',
  analyzing: 'Jadx Decompilation',
  decompiling: 'Jadx Decompilation',
  agentic_start: 'Agentic Process Beginning',
  agentic_done: 'Agentic Process Completed',
  device_check: 'Device Check',
  installing: 'Installing App',
  dynamic_verify: 'Dynamic Verification',
  dynamic_done: 'Dynamic Verification Complete',
  reporting: 'Generating Reports',
  finalizing: 'Finalizing',
  done: 'Complete',
  failed: 'Failed',
  cancelled: 'Stopped',
};

const STAGES = [
  { label: 'Framework Detection', phases: ['starting', 'detecting'], at: 10 },
  { label: 'Jadx Decompilation', phases: ['analyzing', 'decompiling'], at: 45 },
  { label: 'Agentic Process Beginning', phases: ['agentic_start'], at: 62 },
  { label: 'Agentic Process Completed', phases: ['agentic_done'], at: 82 },
  { label: 'Dynamic Verification', phases: ['device_check', 'installing', 'dynamic_verify', 'dynamic_done'], at: 88 },
  { label: 'Finishing Up', phases: ['reporting', 'finalizing', 'done'], at: 98 },
];

function stageStatus(stages, idx, percent, phase) {
  const stage = stages[idx];
  const next = stages[idx + 1];
  if (next && percent >= next.at) return 'done';
  if (phase === 'done') return 'done';
  if (stage.phases.includes(phase) || percent >= stage.at) return 'active';
  return 'pending';
}

function renderStages(percent, phase, stages) {
  stages = stages || STAGES;
  return '<div class="stage-list">' + stages.map((s, i) => {
    const st = stageStatus(stages, i, percent, phase);
    const icon = st === 'done' ? '✓' : st === 'active' ? '◌' : '○';
    return `<div class="stage ${st}"><span class="stage-icon ${st === 'active' ? 'spin' : ''}">${icon}</span>${esc(s.label)}</div>`;
  }).join('') + '</div>';
}

function nav(path) { window.location.hash = '#' + path; }

window.addEventListener('hashchange', route);

function route() {
  if (_cleanupFn) { try { _cleanupFn(); } catch(_) {} _cleanupFn = null; }
  const hash = (window.location.hash || '#/').slice(1) || '/';

  document.querySelectorAll('.sb-link').forEach(el => {
    const r = el.getAttribute('data-r');
    el.classList.toggle('active', r === '/' ? hash === '/' : hash.startsWith(r));
  });

  const m = hash.match(/^\/scans\/(.+)$/);
  if (m) return pageScanDetail(m[1]);
  if (hash === '/scans') return pageScans();
  if (hash === '/settings') return pageSettings();
  pageDashboard();
}

(function startStatusPoll() {
  async function poll() {
    try {
      const s = await apiFetch('GET', '/status');
      _lastStatus = s;
      const dot = document.getElementById('sb-dot');
      const txt = document.getElementById('sb-txt');
      if (dot) dot.className = 'dot' + (s.ready_for_analysis ? ' ok' : '');
      if (txt) txt.textContent = s.ready_for_analysis ? 'Ready' : 'Not configured';
    } catch(_) {}
  }
  poll();
  setInterval(poll, 12000);
})();

function setPage(html) { const p = document.getElementById('page'); if (p) p.innerHTML = html; }
function setHdr(title, sub) {
  const t = document.getElementById('hdr-title'); if (t) t.textContent = title;
  const s = document.getElementById('hdr-sub'); if (s) s.textContent = sub || '';
}
function setActions(html) { const a = document.getElementById('hdr-actions'); if (a) a.innerHTML = html; }
function $id(id) { return document.getElementById(id); }

function configBanner(status) {
  if (!status || status.ready_for_analysis) return '';
  const parts = [];
  if (!status.jadx_configured) parts.push('JADX path');
  if (!status.ollama_configured) parts.push('AI provider');
  return `<div class="banner banner-warn">
    ⚠&nbsp; Setup required: ${esc(parts.join(' and '))} not configured.
    <a onclick="nav('/settings')">&nbsp;Open Settings →</a>
  </div>`;
}

function pageDashboard() {
  setHdr('Dashboard', '');
  setActions('');
  setPage(`
    <div id="config-banner"></div>
    <div class="card">
      <div class="card-title">New Scan</div>
      <div class="drop-zone" id="dz" onclick="$id('fi').click()">
        <div class="drop-icon">⬆</div>
        <div class="drop-text">Drop APK here, or click to browse</div>
        <div class="drop-hint">Supported: .apk</div>
      </div>
      <input type="file" id="fi" accept=".apk" style="display:none" onchange="onFileSelect(this)">
      <div class="path-row">
        <input type="text" id="path-in" placeholder="Or enter absolute file path…" style="flex:1">
        <button class="btn btn-primary" onclick="startFromPath()">Scan</button>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-label">Total Scans</div></div>
      <div class="stat"><div class="stat-val c-green" id="s-done">—</div><div class="stat-label">Completed</div></div>
      <div class="stat"><div class="stat-val c-red" id="s-crit">—</div><div class="stat-label">Critical Findings</div></div>
      <div class="stat"><div class="stat-val c-orange" id="s-high">—</div><div class="stat-label">High Findings</div></div>
      <div class="stat"><div class="stat-val c-blue" id="s-vulntotal">—</div><div class="stat-label">Total Vulnerabilities Found</div></div>
    </div>
    <div class="card">
      <div class="card-title">Recent Scans</div>
      <div id="recent"></div>
    </div>
  `);

  // drop zone
  const dz = $id('dz');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) doUpload(f); });
  }

  async function loadDashData() {
    // update config banner
    try {
      const status = await apiFetch('GET', '/status');
      _lastStatus = status;
      const dot = $id('sb-dot'); if (dot) dot.className = 'dot' + (status.ready_for_analysis ? ' ok' : '');
      const txt = $id('sb-txt'); if (txt) txt.textContent = status.ready_for_analysis ? 'Ready' : 'Not configured';
      const banner = $id('config-banner'); if (banner) banner.innerHTML = configBanner(status);
    } catch(_) {}

    try {
      const data = await apiFetch('GET', '/scans');
      const scans = (data.scans || []).slice().reverse();
      let done = 0, crit = 0, high = 0, vulnTotal = 0;
      scans.forEach(s => {
        const sm = s.summary || {};
        if (s.status === 'completed') done++;
        crit += (sm.critical || 0);
        high += (sm.high || 0);
        vulnTotal += (sm.total_vulnerabilities || 0);
      });
      function sv(id, v) { const e = $id(id); if (e) e.textContent = v; }
      sv('s-total', scans.length);
      sv('s-done', done);
      sv('s-crit', crit);
      sv('s-high', high);
      sv('s-vulntotal', vulnTotal);

      const r = $id('recent');
      if (!r) return;
      const recent = scans.slice(0, 12);
      if (!recent.length) {
        r.innerHTML = '<div class="empty"><div class="big">◉</div>No scans yet. Upload an APK to get started.</div>';
        return;
      }
      r.innerHTML = '<table class="tbl"><thead><tr><th>App / File</th><th>Framework</th><th>Status</th><th>Critical</th><th>High</th><th>Date</th></tr></thead><tbody>' +
        recent.map(s => { const sm = s.summary || {}; return `<tr onclick="nav('/scans/${esc(s.id)}')">
          <td>${esc(sm.app_name || s.filename || s.id)}</td>
          <td class="text-muted">${esc(sm.primary_framework || '—')}</td>
          <td>${statusBadge(s.status)}</td>
          <td>${sm.critical ? '<span class="text-red">' + sm.critical + '</span>' : '—'}</td>
          <td>${sm.high ? '<span class="text-orange">' + sm.high + '</span>' : '—'}</td>
          <td class="text-muted">${fmtDate(s.created_at)}</td>
        </tr>`; }).join('') + '</tbody></table>';
    } catch(_) {}
  }

  loadDashData();
  const iv = setInterval(loadDashData, 5000);
  _cleanupFn = () => clearInterval(iv);
}

async function doUpload(file) {
  setPage('<div class="empty"><div class="spin" style="font-size:28px">◌</div><br>Uploading ' + esc(file.name) + '…</div>');
  try {
    const fd = new FormData(); fd.append('file', file);
    const res = await fetch('/api/scans', { method: 'POST', body: fd });
    if (!res.ok) {
      let msg = 'Upload failed (' + res.status + ')';
      try {
        const j = await res.json();
        if (typeof j.detail === 'string') msg = j.detail;
        else if (j.detail && typeof j.detail === 'object') msg = j.detail.message || msg;
      } catch(_) {}
      throw new Error(msg);
    }
    const { id } = await res.json();
    nav('/scans/' + id);
  } catch(e) { toast(e.message, true); pageDashboard(); }
}

function pageScans() {
  setHdr('Scans', 'All scan history');
  setActions('');
  setPage(`
    <div class="card">
      <div class="search-row">
        <input type="text" id="scan-q" placeholder="Search by app name, package, or framework…" oninput="filterScans(this.value)">
      </div>
      <div class="sel-bar">
        <span class="sel-count" id="sel-count">0 selected</span>
        <button class="btn btn-ghost btn-sm" id="sel-del-btn" style="display:none;color:#ff6666;border-color:#ff6666" onclick="deleteSelected()">Delete selected</button>
      </div>
      <div id="scan-tbl"></div>
    </div>
  `);

  let allScans = [];
  let selected = new Set();

  function updateSelBar() {
    const n = selected.size;
    const cnt = $id('sel-count');
    const btn = $id('sel-del-btn');
    if (cnt) { cnt.textContent = n + ' selected'; cnt.className = 'sel-count' + (n ? ' active' : ''); }
    if (btn) btn.style.display = n ? '' : 'none';
  }

  window.toggleScanSel = function(id, cb) {
    if (cb.checked) selected.add(id); else selected.delete(id);
    updateSelBar();
  };

  window.toggleAllScans = function(cb, ids) {
    ids.forEach(id => cb.checked ? selected.add(id) : selected.delete(id));
    document.querySelectorAll('.scan-cb').forEach(c => c.checked = cb.checked);
    updateSelBar();
  };

  window.deleteSelected = async function() {
    if (!selected.size) return;
    if (!confirm(`Delete ${selected.size} scan(s) and their reports?`)) return;
    const ids = [...selected];
    await Promise.all(ids.map(id => apiFetch('DELETE', '/scans/' + id).catch(() => {})));
    selected.clear();
    updateSelBar();
    toast('Deleted ' + ids.length + ' scan(s)');
    load();
  };

  window.filterScans = function(q) {
    q = (q || '').toLowerCase();
    const list = q ? allScans.filter(s => {
      const sm = s.summary || {};
      return [sm.app_name, s.filename, sm.package_name, sm.primary_framework].some(v => (v || '').toLowerCase().includes(q));
    }) : allScans;
    renderScanTable(list);
  };

  function renderScanTable(scans) {
    const t = $id('scan-tbl');
    if (!t) return;
    if (!scans.length) { t.innerHTML = '<div class="empty"><div class="big">◉</div>No scans found.</div>'; return; }
    const ids = scans.map(s => `'${esc(s.id)}'`).join(',');
    t.innerHTML = '<table class="tbl"><thead><tr>'
      + `<th class="cb-cell"><input type="checkbox" onclick="toggleAllScans(this,[${ids}])" title="Select all"></th>`
      + '<th>App / File</th><th>Package</th><th>Framework</th><th>Status</th><th>Critical</th><th>High</th><th>Total</th><th>Date</th></tr></thead><tbody>'
      + scans.map(s => { const sm = s.summary || {}; return `<tr onclick="nav('/scans/${esc(s.id)}')">
        <td class="cb-cell" onclick="event.stopPropagation()">
          <input type="checkbox" class="scan-cb" ${selected.has(s.id)?'checked':''} onchange="toggleScanSel('${esc(s.id)}',this)">
        </td>
        <td>${esc(sm.app_name || s.filename || s.id)}${s.kind === 'dynamic' ? ' <span class="badge badge-info">Dynamic</span>' : ''}</td>
        <td class="text-muted">${esc(sm.package_name || (s.kind === 'dynamic' ? s.app_package : '') || '—')}</td>
        <td class="text-muted">${esc(sm.primary_framework || '—')}</td>
        <td>${statusBadge(s.status)}</td>
        <td>${sm.critical ? '<span class="text-red">' + sm.critical + '</span>' : '—'}</td>
        <td>${sm.high ? '<span class="text-orange">' + sm.high + '</span>' : '—'}</td>
        <td>${sm.total_vulnerabilities ? '<strong>' + sm.total_vulnerabilities + '</strong>' : '—'}</td>
        <td class="text-muted">${fmtDate(s.created_at)}</td>
      </tr>`; }).join('') + '</tbody></table>';
  }

  async function load() {
    try {
      const data = await apiFetch('GET', '/scans');
      allScans = (data.scans || []).slice().reverse();
      const q = ($id('scan-q') || {}).value || '';
      window.filterScans(q);
    } catch(_) {}
  }

  load();
  const iv = setInterval(load, 4000);
  _cleanupFn = () => {
    clearInterval(iv);
    delete window.filterScans;
    delete window.toggleScanSel;
    delete window.toggleAllScans;
    delete window.deleteSelected;
  };
}

async function pageScanDetail(id) {
  setHdr('Scan Detail', 'Loading…');
  setActions('<button class="btn btn-ghost btn-sm" onclick="nav(\'/scans\')">← Back</button>');
  setPage('<div class="empty"><div class="spin" style="font-size:28px">◌</div><br>Loading…</div>');

  let ws = null;
  window.stopScan = async function(scanId, btn) {
    if (!confirm('Stop this scan? Work in progress will be discarded.')) return;
    if (btn) { btn.disabled = true; btn.textContent = 'Stopping…'; }
    try {
      await apiFetch('POST', '/scans/' + scanId + '/stop');
      toast('Stopping scan…');
    } catch(e) {
      toast(e.message, true);
      if (btn) { btn.disabled = false; btn.textContent = '■ Stop'; }
    }
  };
  _cleanupFn = () => { if (ws) { ws.close(); ws = null; } delete window.stopScan; };

  const ACTIVE_STATUSES = ['queued', 'running'];

  try {
    const data = await apiFetch('GET', '/scans/' + id);
    const meta = data.meta || {};
    const result = data.result || null;
    const sm = meta.summary || {};
    const reports = (result && result.reports) || {};

    setHdr('Scan Detail', sm.app_name || meta.filename || id);
    let exportDropdown = '';
    if (meta.status === 'completed' && result) {
      // HTML/PDF/JSON are all generated on demand from the stored result, so
      // every format is always offered. Endpoints send them as downloads.
      const items = ['json', 'html', 'pdf'].map(fmt =>
        `<a class="export-item" href="/api/scans/${esc(id)}/report/${fmt}" download>${fmt.toUpperCase()}</a>`);
      exportDropdown = `<div class="export-wrap" id="export-wrap">
        <button class="btn btn-primary btn-sm" onclick="toggleExport(event)">Export Report ▾</button>
        <div class="export-menu">${items.join('')}</div>
      </div>`;
    }
    let stopBtn = '';
    if (ACTIVE_STATUSES.includes(meta.status)) {
      stopBtn = `<button class="btn btn-ghost btn-sm" style="color:#ff6666;border-color:#ff6666" onclick="stopScan('${esc(id)}',this)">■ Stop</button>`;
    }
    setActions('<div style="display:flex;gap:6px;align-items:center"><button class="btn btn-ghost btn-sm" onclick="nav(\'/scans\')">← Back</button>' + stopBtn + exportDropdown + '</div>');

    if (ACTIVE_STATUSES.includes(meta.status)) {
      renderLive(id, meta);
    } else {
      renderComplete(meta, result);
    }
  } catch(e) {
    setPage('<div class="empty"><span class="text-red">' + esc(e.message) + '</span></div>');
  }

  function renderLive(scanId, initialMeta) {
    let lastPercent = (initialMeta && initialMeta.progress) || 0;
    let lastPhase = (initialMeta && initialMeta.phase) || 'starting';
    const stages = STAGES;

    setPage(`
      <div class="card">
        <div class="card-title">Progress</div>
        <div id="lv-stages">${renderStages(lastPercent, lastPhase, stages)}</div>
        <div class="row-between" style="margin:12px 0 4px">
          <span id="lv-phase" style="font-size:11px;color:#888">${esc(PHASE_LABELS[lastPhase] || lastPhase)}</span>
          <span id="lv-pct" style="font-size:11px;color:#00ff88">${Math.round(lastPercent)}%</span>
        </div>
        <div class="prog-wrap"><div class="prog-bar" id="lv-bar" style="width:${Math.round(lastPercent)}%"></div></div>
        <div id="lv-msg" style="font-size:10px;color:#555;margin-top:4px"></div>
      </div>
      <div class="card">
        <div class="card-title">Live Logs</div>
        <div class="log-panel" id="lv-log"><div class="ll">Connecting…</div></div>
      </div>
    `);

    function updateProgress(percent, phase, message) {
      lastPercent = percent; lastPhase = phase;
      const sl = $id('lv-stages'); if (sl) sl.innerHTML = renderStages(lastPercent, lastPhase, stages);
      const pb = $id('lv-bar'); if (pb) pb.style.width = lastPercent + '%';
      const pe = $id('lv-pct'); if (pe) pe.textContent = lastPercent + '%';
      const ph = $id('lv-phase'); if (ph) ph.textContent = PHASE_LABELS[lastPhase] || lastPhase || '';
      if (message != null) { const pm = $id('lv-msg'); if (pm) pm.textContent = message; }
    }

    function appendLog(message, cls) {
      const panel = $id('lv-log');
      if (!panel) return;
      const line = document.createElement('div');
      line.className = 'll' + (cls ? ' ' + cls : '');
      line.textContent = message || '';
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
      while (panel.children.length > 500) panel.removeChild(panel.firstChild);
    }

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '/api/ws/scans/' + scanId);

    ws.onopen = function() {
      const panel = $id('lv-log');
      if (panel) panel.innerHTML = '';
      appendLog('Connected — watching scan ' + scanId, 'ok');
    };

    ws.onmessage = function(ev) {
      let msg; try { msg = JSON.parse(ev.data); } catch(_) { return; }

      if (msg.type === 'progress') {
        updateProgress(Math.round(msg.percent || 0), msg.phase || lastPhase, msg.message || '');
      }

      if (msg.type === 'log') {
        appendLog(msg.message || '');
      }

      if (msg.type === 'meta' && msg.meta) {
        const sm = msg.meta.summary || {};
        if (sm.app_name) setHdr('Scan Detail', sm.app_name);
        updateProgress(Math.round(msg.meta.progress || 0), msg.meta.phase || lastPhase, null);
      }

      if (msg.type === 'status' && (msg.status === 'completed' || msg.status === 'failed' || msg.status === 'cancelled')) {
        if (msg.status === 'failed' && msg.error) appendLog('ERROR: ' + msg.error, 'err');
        if (msg.status === 'cancelled') appendLog('Scan stopped by user', 'warn');
        const phase = msg.status === 'failed' ? 'failed' : msg.status === 'cancelled' ? 'cancelled' : 'done';
        const message = msg.status === 'failed' ? (msg.error || 'Scan failed.')
          : msg.status === 'cancelled' ? 'Scan stopped.' : 'Scan complete';
        updateProgress(100, phase, message);
        ws.close(); ws = null;
        setTimeout(() => pageScanDetail(scanId), 600);
      }
    };

    ws.onerror = function() {
      appendLog('WebSocket error — retrying…', 'err');
    };

    ws.onclose = function() {
      if (ws !== null) {
        appendLog('Connection closed; reconnecting…', 'warn');
        setTimeout(() => { if (document.getElementById('lv-log')) renderLive(scanId, { progress: lastPercent, phase: lastPhase }); }, 1500);
      }
    };
  }

  function renderComplete(meta, result) {
    const sm = meta.summary || {};
    const fw = (result && result.framework_detection) || {};
    const app = (result && result.application_info) || {};
    const summary = (result && result.summary) || {};
    const analysis = (result && result.analysis) || {};
    const bySeverity = (result && result.vulnerability_analysis && result.vulnerability_analysis.vulnerabilities) || {};
    const SEV_LABELS = { critical: 'Critical', high: 'High', medium: 'Medium', low: 'Low', info: 'Informational' };
    const vulns = ['critical', 'high', 'medium', 'low', 'info'].reduce((acc, sv) =>
      acc.concat((bySeverity[sv] || []).map(v => Object.assign({ severity: SEV_LABELS[sv] }, v))), []);

    const score = summary.security_score != null ? summary.security_score : (sm.security_score != null ? sm.security_score : null);
    const pf = fw.primary_framework || sm.primary_framework || '—';
    const pkg = app.package_name || sm.package_name || '—';
    const ver = app.version_name || '—';
    const sdk = app.min_sdk || '—';
    const appName = app.app_name || sm.app_name || meta.filename || id;
    const ring = score !== null ? ringHTML(score) : '';

    setPage(`
      <div class="card">
        <div class="score-wrap">
          ${ring}
          <div style="flex:1">
            <div style="font-size:16px;font-weight:700;margin-bottom:2px;color:#e0e0e0">${esc(appName)}</div>
            <div class="text-muted" style="margin-bottom:8px">${esc(pkg)}</div>
            <div class="meta-grid">
              <div><div class="mk">Framework</div><div class="mv">${esc(pf)}</div></div>
              <div><div class="mk">Version</div><div class="mv">${esc(ver)}</div></div>
              <div><div class="mk">Min SDK</div><div class="mv">${esc(sdk)}</div></div>
              <div><div class="mk">Status</div><div class="mv">${statusBadge(meta.status)}</div></div>
            </div>
          </div>
        </div>
      </div>
      ${renderDynamicSession(result)}
      ${renderVulns(vulns, result, meta, analysis)}
    `);
  }

  function renderDynamicSession(result) {
    const s = result && result.dynamic_session;
    if (!s) return '';
    const chip = (ok, label, msg) => `<span class="badge ${ok ? 'badge-done' : 'badge-failed'}" title="${esc(msg || '')}">${ok ? '✓' : '✗'} ${esc(label)}</span>`;

    if (!s.attempted) {
      return `<div class="card">
        <div class="card-title">Dynamic Verification</div>
        <div class="text-muted" style="font-size:12px">${esc(s.reason || s.skipped_reason || 'Dynamic verification did not run for this scan.')}</div>
      </div>`;
    }

    const install = s.install || {};
    const frida = s.frida || {};
    const verified = s.verified_count || 0;
    const total = s.total_count || 0;

    return `<div class="card">
      <div class="card-title">Dynamic Verification</div>
      <div class="meta-grid" style="margin-bottom:10px">
        <div><div class="mk">Device</div><div class="mv">${esc(s.device || '—')}</div></div>
        <div><div class="mk">Package</div><div class="mv">${esc(s.package || '—')}</div></div>
        <div><div class="mk">Verified</div><div class="mv">${verified} / ${total}</div></div>
      </div>
      <div class="filter-row" style="margin-bottom:10px">
        ${chip(!!install.ok, 'App Installed', install.message)}
        ${chip(!!frida.ok, 'Frida', frida.message)}
      </div>
      ${s.skipped_reason ? `<div class="vsect"><div class="vk">Note</div><div class="vv">${esc(s.skipped_reason)}</div></div>` : ''}
    </div>`;
  }

  function ringHTML(score) {
    const s = Math.max(0, Math.min(100, Math.round(score)));
    const r = 34, cx = 42, cy = 42, circ = 2 * Math.PI * r;
    const dash = (s / 100) * circ;
    const col = s >= 70 ? '#00ff88' : s >= 40 ? '#ffcc33' : '#ff6666';
    return `<svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="7"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="7"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
        stroke-linecap="round"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        fill="${col}" font-size="15" font-weight="700" font-family="Menlo,monospace">${s}</text>
    </svg>`;
  }

  function renderVulns(vulns, result, meta, analysis) {
    if (meta.status === 'failed') {
      const err = meta.error || (analysis && analysis.error) || 'Scan failed.';
      return '<div class="card"><div class="empty"><span class="text-red">' + esc(err) + '</span></div></div>';
    }
    if (meta.status === 'cancelled') {
      return '<div class="card"><div class="empty"><span class="text-muted">Scan was stopped before it finished.</span></div></div>';
    }
    const a = analysis || {};
    if (!vulns.length) {
      if (a.unsupported_framework || a.supported === false) {
        const fwName = (result && result.framework_detection && result.framework_detection.primary_framework) || '?';
        return '<div class="card"><div class="empty">Framework detected: <strong>' + esc(fwName) + '</strong><br><br><span style="color:#666">Deep vulnerability analysis is not yet supported for this framework.</span></div></div>';
      }
      return '<div class="card"><div class="empty"><span class="text-green">✓ No vulnerabilities found</span></div></div>';
    }

    const sevs = ['Critical','High','Medium','Low','Informational'];
    const counts = {};
    sevs.forEach(sv => counts[sv] = 0);
    vulns.forEach(v => { const sv = v.severity || 'Informational'; counts[sv] = (counts[sv] || 0) + 1; });

    window._vulns_all = vulns;
    window.setVulnFilter = function(f, btn) {
      document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const list = $id('vuln-list');
      if (!list) return;
      const filtered = f === 'all' ? window._vulns_all : window._vulns_all.filter(v => (v.severity || 'Informational') === f);
      list.innerHTML = filtered.map(vulnHTML).join('');
    };

    return `<div class="card">
      <div class="row-between" style="margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">Vulnerabilities (${vulns.length})</div>
      </div>
      <div class="filter-row">
        <button class="flt active" onclick="setVulnFilter('all',this)">All (${vulns.length})</button>
        ${sevs.filter(sv => counts[sv] > 0).map(sv =>
          `<button class="flt" onclick="setVulnFilter('${esc(sv)}',this)">${esc(sv)} (${counts[sv]})</button>`
        ).join('')}
      </div>
      <div id="vuln-list">${vulns.map(vulnHTML).join('')}</div>
    </div>`;
  }

  function dynBadge(dv, reasonId) {
    // No badge at all when the finding didn't need runtime verification.
    if (!dv || !dv.status) return '';
    if (dv.status === 'verified') {
      return `<span class="badge badge-verified" title="Proven at runtime">✓ Dynamically Verified</span>`;
    }
    // Needed verification but couldn't be proven → red.
    return `<span class="badge badge-unverified" onclick="toggleDynReason('${reasonId}')" title="Click for details">✗ Not Verified</span>`;
  }

  function vulnHTML(v, idx) {
    const dv = v.dynamic_verification;
    const reasonId = 'dyn-reason-' + idx;
    const cvssBadge = (v.cvss_score !== null && v.cvss_score !== undefined)
      ? `<span class="badge badge-cvss" title="${v.cvss_vector ? esc(v.cvss_vector) : ''}">CVSS ${Number(v.cvss_score).toFixed(1)}</span>` : '';
    return `<div class="vuln">
      <div class="vuln-hdr">
        <div class="vuln-title">${esc(v.title || v.type || 'Finding')}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${sevBadge(v.severity || 'Informational')}
          ${cvssBadge}
          ${dynBadge(dv, reasonId)}
        </div>
      </div>
      <div class="vuln-body">
        ${v.description ? '<div>' + esc(v.description) + '</div>' : ''}
        ${v.file ? `<div class="vsect"><div class="vk">Location</div><div class="vv">${esc(v.file)}${v.line ? ':' + v.line : ''}</div></div>` : ''}
        ${v.cvss_vector ? `<div class="vsect"><div class="vk">CVSS v3.1 Vector</div><div class="vv" style="font-family:Menlo,monospace">${esc(v.cvss_vector)}</div></div>` : ''}
        ${v.code_snippet ? `<div class="code-snip">${esc(v.code_snippet)}</div>` : ''}
        ${v.impact ? `<div class="vsect"><div class="vk">Impact</div><div class="vv">${esc(v.impact)}</div></div>` : ''}
        ${v.recommendation ? `<div class="vsect"><div class="vk">Recommendation</div><div class="vv">${esc(v.recommendation)}</div></div>` : ''}
        ${v.cwe ? `<div class="vsect"><div class="vk">CWE</div><div class="vv">${esc(v.cwe)}</div></div>` : ''}
        ${v.owasp ? `<div class="vsect"><div class="vk">OWASP</div><div class="vv">${esc(v.owasp)}</div></div>` : ''}
        ${dv && dv.status === 'verified' ? `<div class="vsect"><div class="vk">Dynamic Verification — Evidence</div><div class="vv">${esc(dv.evidence || '')}</div></div>` : ''}
        ${dv && dv.status !== 'verified' ? `<div class="vsect dyn-reason" id="${reasonId}"><div class="vk">Why dynamic ${dv.status === 'not_attempted' ? "didn't run" : 'verification failed'}</div><div class="vv">${esc(dv.reason || '')}</div></div>` : ''}
      </div>
    </div>`;
  }
}

function toggleDynReason(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

async function pageSettings() {
  setHdr('Settings', 'Configuration');
  setActions('');
  setPage('<div class="empty"><div class="spin" style="font-size:24px">◌</div><br>Loading…</div>');
  try {
    const [cfg, promptsRes, skillsRes] = await Promise.all([
      apiFetch('GET', '/settings'),
      apiFetch('GET', '/settings/prompts'),
      apiFetch('GET', '/settings/skills'),
    ]);
    renderSettingsForm(cfg, promptsRes.prompts || [], skillsRes.skills || []);
  } catch(e) {
    setPage('<div class="empty text-red">' + esc(e.message) + '</div>');
  }
}

function renderSettingsForm(cfg, promptsData, skillsData) {
  let activeTab = cfg.active_provider || '';
  const providerOrder = cfg.provider_order || Object.keys(cfg.providers || {});
  const providers = cfg.providers || {};

  function buildPage() {
    setPage(`
      <div class="card">
        <div class="card-title">General</div>
        <div class="field">
          <label>JADX Path</label>
          <input type="text" id="g-jadx" value="${esc(cfg.jadx_path || '')}" placeholder="/usr/local/bin/jadx" style="width:100%">
          <div class="hint">Full path to JADX executable. Install via: brew install jadx</div>
        </div>
        <div class="field">
          <label>Output Directory</label>
          <input type="text" id="g-outdir" value="${esc(cfg.output_dir || '')}" placeholder="${esc(cfg.output_dir_default || '')}" style="width:100%">
          <div class="hint">Where scan folders are saved. Leave blank to use the default: ${esc(cfg.output_dir_default || '')}</div>
        </div>
        <div class="field">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Dynamic verification</div>
              <div class="toggle-sub">After static analysis, try to prove findings on a connected emulator/device</div>
            </div>
            <div class="sw${cfg.dynamic_verification ? ' on' : ''}" id="dynver-sw" onclick="this.classList.toggle('on')">
              <div class="sw-knob"></div>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Agent memory</div>
              <div class="toggle-sub">Give the dynamic-verification AI the static-analysis investigation notes as context</div>
            </div>
            <div class="sw${cfg.agent_memory ? ' on' : ''}" id="mem-sw" onclick="this.classList.toggle('on')">
              <div class="sw-knob"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button class="btn btn-primary" onclick="saveGeneral()">Save</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">AI Provider</div>
        <div class="ptabs" id="ptabs">
          ${providerOrder.map(p => `<div class="ptab${p === activeTab ? ' active' : ''}" data-p="${esc(p)}" onclick="switchPTab('${esc(p)}')">${esc(p)}${p === cfg.active_provider ? ' <span style="color:#00ff88;font-size:8px">●</span>' : ''}</div>`).join('')}
        </div>
        <div id="pcfg">${buildProviderCfg(activeTab, providers[activeTab] || {}, cfg.active_provider)}</div>
      </div>

      ${buildPromptsCard(promptsData)}
      ${buildSkillsCard(skillsData)}
    `);
  }

  function buildPromptsCard(prompts) {
    return `
      <div class="card">
        <div class="card-title">Prompts</div>
        <div class="hint" style="margin-bottom:10px">System prompts sent to the AI provider during analysis. Edit and save to override the built-in default — used on the next scan.</div>
        ${prompts.map(p => `
          <div class="field">
            <label>${esc(p.label)}${p.is_custom ? ' <span class="text-green" style="font-size:9px">● customized</span>' : ''}</label>
            <div class="hint" style="margin-bottom:6px">${esc(p.help)}</div>
            <textarea class="mono" id="prompt-${esc(p.id)}" rows="10">${esc(p.current)}</textarea>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
              <button class="btn" onclick="resetPrompt('${esc(p.id)}')">Reset to default</button>
              <button class="btn btn-primary" onclick="savePrompt('${esc(p.id)}')">Save</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function buildSkillsCard(skills) {
    return `
      <div class="card">
        <div class="card-title">Skills</div>
        <div class="hint" style="margin-bottom:10px">Markdown skill files the analysis agent loads for extra domain guidance, stored in lu77U_MobileSec/skills/.</div>
        <input type="file" id="skill-fi" accept=".md" style="display:none" onchange="onSkillFileSelect(this)">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
          <button class="btn btn-primary" onclick="$id('skill-fi').click()">Upload skill (.md)</button>
        </div>
        ${skills.length ? `<table class="tbl"><thead><tr><th>Name</th><th>File</th><th>Size</th></tr></thead><tbody>${
          skills.map(s => `<tr><td>${esc(s.name)}</td><td class="text-muted">${esc(s.filename)}</td><td class="text-muted">${fmtSize(s.size)}</td></tr>`).join('')
        }</tbody></table>` : '<div class="hint">No skills uploaded yet.</div>'}
      </div>
    `;
  }

  window.saveGeneral = async function() {
    try {
      const jadx = (($id('g-jadx') || {}).value || '').trim();
      const outdir = (($id('g-outdir') || {}).value || '').trim();
      const dynver = !!($id('dynver-sw') || {}).classList?.contains('on');
      const mem = !!($id('mem-sw') || {}).classList?.contains('on');
      await apiFetch('PUT', '/settings', {
        jadx_path: jadx, output_dir: outdir,
        dynamic_verification: dynver, agent_memory: mem,
      });
      cfg.jadx_path = jadx;
      cfg.output_dir = outdir;
      cfg.dynamic_verification = dynver;
      cfg.agent_memory = mem;
      toast('Settings saved');
    } catch(e) { toast(e.message, true); }
  };

  window.setActiveProvider = async function(p) {
    try {
      await apiFetch('PUT', '/settings', { active_provider: p });
      cfg.active_provider = p;
      // refresh tab labels so the dot moves
      document.querySelectorAll('.ptab').forEach(t => {
        const name = t.getAttribute('data-p');
        t.innerHTML = esc(name) + (name === p ? ' <span style="color:#00ff88;font-size:8px">●</span>' : '');
      });
      toast(esc(p) + ' set as active provider');
    } catch(e) { toast(e.message, true); }
  };

  window.switchPTab = function(p) {
    activeTab = p;
    document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.getAttribute('data-p') === p));
    const pc = $id('pcfg'); if (pc) pc.innerHTML = buildProviderCfg(p, providers[p] || {}, cfg.active_provider);
  };

  async function persistProviderCfg(p) {
    const model = ($id('p-model') || {}).value || '';
    const baseUrl = (($id('p-baseurl') || {}).value || '').trim();
    const body = { providers: { [p]: { model } } };
    if (baseUrl) body.providers[p].base_url = baseUrl;
    await apiFetch('PUT', '/settings', body);
    providers[p] = Object.assign(providers[p] || {}, { model });
    if (baseUrl) providers[p].base_url = baseUrl;
  }

  window.saveProviderCfg = async function(p) {
    try {
      await persistProviderCfg(p);
      toast('Config saved');
    } catch(e) { toast(e.message, true); }
  };

  window.saveApiKey = async function(p) {
    const key = (($id('p-apikey') || {}).value || '').trim();
    if (!key) { toast('Enter an API key', true); return; }
    try {
      await apiFetch('POST', '/settings/credentials', { provider: p, api_key: key });
      toast('API key saved to keychain');
      const inp = $id('p-apikey'); if (inp) { inp.value = ''; inp.placeholder = '●●●● saved'; }
    } catch(e) { toast(e.message, true); }
  };

  window.testConn = async function(p) {
    const r = $id('test-res'); if (r) r.innerHTML = '<span style="color:#777">Saving config & testing…</span>';
    try {
      // Test always reflects the currently-typed model/base URL, so save first.
      await persistProviderCfg(p);
      const res = await apiFetch('POST', '/settings/test', { provider: p });
      if (r) r.innerHTML = res.ok
        ? '<span class="text-green">✓ OK' + (res.model ? ' · ' + esc(res.model) : '') + '</span>'
        : '<span class="text-red">✗ ' + esc(res.error || 'Failed') + '</span>';
    } catch(e) { if (r) r.innerHTML = '<span class="text-red">✗ ' + esc(e.message) + '</span>'; }
  };

  window.toggleKeyVis = function() {
    const inp = $id('p-apikey'); if (!inp) return;
    inp.type = inp.type === 'password' ? 'text' : 'password';
    const btn = $id('vis-btn'); if (btn) btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
  };

  window.savePrompt = async function(id) {
    const ta = $id('prompt-' + id); if (!ta) return;
    try {
      const res = await apiFetch('PUT', '/settings/prompts/' + id, { text: ta.value });
      const idx = promptsData.findIndex(p => p.id === id);
      if (idx >= 0) promptsData[idx] = res;
      buildPage();
      toast('Prompt saved');
    } catch(e) { toast(e.message, true); }
  };

  window.resetPrompt = async function(id) {
    try {
      const res = await apiFetch('DELETE', '/settings/prompts/' + id);
      const idx = promptsData.findIndex(p => p.id === id);
      if (idx >= 0) promptsData[idx] = res;
      buildPage();
      toast('Prompt reset to default');
    } catch(e) { toast(e.message, true); }
  };

  window.onSkillFileSelect = async function(inp) {
    const file = inp.files[0]; if (!file) return;
    try {
      const fd = new FormData(); fd.append('file', file);
      const res = await apiFetch('POST', '/settings/skills', fd);
      const idx = skillsData.findIndex(s => s.name === res.name);
      if (idx >= 0) skillsData[idx] = res; else skillsData.push(res);
      buildPage();
      toast(res.overwritten ? `Skill '${res.name}' replaced` : `Skill '${res.name}' uploaded`);
    } catch(e) { toast(e.message, true); }
    inp.value = '';
  };

  _cleanupFn = () => {
    ['saveGeneral','setActiveProvider','switchPTab','saveProviderCfg','saveApiKey','testConn','toggleKeyVis',
     'savePrompt','resetPrompt','onSkillFileSelect'].forEach(k => delete window[k]);
  };

  buildPage();
}

function buildProviderCfg(provider, pdata, activeProvider) {
  const isActive = provider === activeProvider;
  const isOllama = provider === 'ollama';
  const isCustom = provider === 'custom';
  const isCloud  = !isOllama && !isCustom;   // claude / openai / gemini
  const models   = pdata.available_models || [];
  const curModel = pdata.model || '';

  const keyField = (label, required) => `
    <div class="field">
      <label>${label} ${required ? '' : '<span class="text-muted">(optional)</span>'} ${pdata.has_api_key ? '<span class="text-green" style="font-size:9px">● saved</span>' : ''}</label>
      <div class="key-row">
        <input type="password" id="p-apikey" placeholder="${pdata.has_api_key ? 'Enter new key to replace…' : 'Paste API key…'}" style="flex:1">
        <button type="button" class="btn btn-ghost btn-sm" id="vis-btn" onclick="toggleKeyVis()">Show</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveApiKey('${esc(provider)}')">Save</button>
      </div>
      <div class="hint">Stored in OS keychain — never written to disk in plaintext.</div>
    </div>`;

  const baseUrlField = (defaultUrl, required) => `
    <div class="field">
      <label>Base URL ${required ? '' : '<span class="text-muted">(optional)</span>'}</label>
      <input type="text" id="p-baseurl" value="${esc(pdata.base_url || defaultUrl)}" style="width:100%"
        placeholder="${defaultUrl}">
    </div>`;

  const modelField = (required) => `
    <div class="field">
      <label>Model ${required ? '' : '<span class="text-muted">(optional)</span>'}</label>
      ${models.length
        ? `<select id="p-model" style="width:100%">${models.map(m => `<option value="${esc(m)}"${m === curModel ? ' selected' : ''}>${esc(m)}</option>`).join('')}</select>`
        : `<input type="text" id="p-model" value="${esc(curModel)}" placeholder="e.g. llama3" style="width:100%">`}
    </div>`;

  return `
    ${isActive
      ? '<div style="font-size:10px;color:#00ff88;margin-bottom:10px">● Active provider</div>'
      : `<div style="margin-bottom:10px"><button type="button" class="btn btn-ghost btn-sm" onclick="setActiveProvider('${esc(provider)}')">Set as active provider</button></div>`}

    ${isCloud  ? modelField(true)  : ''}
    ${isCloud  ? keyField('API Key', true) : ''}

    ${isOllama ? baseUrlField('http://localhost:11434', false) : ''}
    ${isOllama ? modelField(false) : ''}
    ${isOllama ? keyField('API Key', false) : ''}

    ${isCustom ? baseUrlField('http://localhost:8080', true) : ''}
    ${isCustom ? keyField('API Key', true) : ''}
    ${isCustom ? modelField(false) : ''}

    <div class="test-row">
      <div id="test-res"></div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="saveProviderCfg('${esc(provider)}')">Save Config</button>
      <button type="button" class="btn btn-primary btn-sm" onclick="testConn('${esc(provider)}')">Test Connection</button>
    </div>
  `;
}

route();
</script>
</body>
</html>
