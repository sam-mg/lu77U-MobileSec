name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 build pytest pytest-asyncio
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 lu77u_mobilesec --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 lu77u_mobilesec --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Install package dependencies
      run: |
        pip install -e .[dev]
    
    - name: Test with pytest
      run: |
        pytest -v || echo "No tests found, continuing..."
    
    - name: Test package build
      run: |
        python -m build
        pip install dist/*.whl
        lu77u-mobilesec --help
